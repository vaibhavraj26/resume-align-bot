<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Optimized Resume</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', 'Calibri', sans-serif;
      font-size: 10pt;
      line-height: 1.35;
      color: #000000;
      background: #ffffff;
      padding: 0.5in;
    }

    /* ── Colors & Styles matching screenshot ──────────── */
    .theme-blue { color: #1a365d; }
    .theme-border { border-bottom: 2px solid #1a365d; }
    a { color: #0000EE; text-decoration: underline; }
    strong, b { font-weight: bold; }
    .bold-blue { color: #1a365d; font-weight: bold; }

    /* ── Name / Header ─────────────────────────────────── */
    h1.name {
      font-size: 24pt;
      font-weight: bold;
      color: #1a365d;
      margin-bottom: 4px;
    }

    .contact-info {
      font-size: 10pt;
      color: #000000;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
    }

    /* ── Section ───────────────────────────────────────── */
    .section {
      margin-top: 12px;
    }

    .section-title {
      font-size: 12pt;
      font-weight: normal;
      color: #1a365d;
      text-transform: uppercase;
      border-bottom: 1px solid #1a365d;
      padding-bottom: 2px;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    /* ── Subheadings (Flexbox) ────────────────────────── */
    .subheading-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 2px;
    }
    
    .subheading-left {
      font-weight: bold;
      color: #1a365d;
      font-size: 10.5pt;
    }
    
    .subheading-right {
      font-size: 10pt;
      color: #000000;
    }

    /* ── Content ───────────────────────────────────────── */
    .section-content p {
      margin-bottom: 4px;
      font-size: 10pt;
    }

    .bullet-item {
      margin-left: 15px;
      margin-bottom: 3px;
      font-size: 10pt;
      text-indent: -10px;
    }
    .bullet-item::before {
      content: "•";
      display: inline-block;
      width: 10px;
    }

    /* ── Score Badge (top-right) ────────────────────────── */
    .score-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #1a365d;
      color: #fff;
      font-size: 8pt;
      padding: 4px 10px;
      border-radius: 4px;
      font-weight: bold;
    }

    /* ── Print Optimizations ────────────────────────────── */
    @media print {
      body {
        padding: 0;
      }
      .score-badge {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="score-badge">ATS Score: {{SCORE}}</div>
  {{RESUME_CONTENT}}
</body>
</html>
